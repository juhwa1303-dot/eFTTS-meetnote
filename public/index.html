<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>eFTTS MeetNote</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet" />
  <style>
    :root{--sky:#5BABF5;--sky-lt:#EBF5FE;--sky-mid:#BDE0FC;--sky-dk:#2E86D4;--white:#FFF;--bg:#F4F8FC;--border:#DDE8F2;--border-lt:#EDF3F9;--text-1:#18242F;--text-2:#465770;--text-3:#8A9BB0;--red:#EF4444;--red-lt:#FEE2E2;--sh:0 2px 14px rgba(60,110,170,.10);--sh-md:0 4px 28px rgba(60,110,170,.13);--r:8px;--r-md:12px;--r-lg:16px;--hh:58px;--ease:.16s ease;--font:'Pretendard','Apple SD Gothic Neo','Noto Sans KR',sans-serif}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:var(--font);background:var(--bg);color:var(--text-1);font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased}
    button{font-family:var(--font);cursor:pointer;border:none;background:none}
    input,select,textarea{font-family:var(--font)}
    .wrap{max-width:1280px;margin:0 auto;padding:0 36px}
    .hdr{position:fixed;top:0;left:0;right:0;z-index:100;height:var(--hh);background:rgba(255,255,255,.95);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);box-shadow:0 1px 4px rgba(60,110,170,.07)}
    .hdr-inner{max-width:1280px;margin:0 auto;padding:0 36px;height:var(--hh);display:flex;align-items:center;gap:24px}
    .logo{display:flex;align-items:center;gap:8px;font-weight:800;font-size:18px;letter-spacing:-.3px;color:var(--text-1);cursor:pointer;flex-shrink:0}
    .logo-mark{width:28px;height:28px;border-radius:8px;background:var(--sky);display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:900}
    .nav{display:flex;gap:2px}
    .nav-btn{padding:6px 14px;border-radius:var(--r);font-size:14px;font-weight:600;color:var(--text-2);cursor:pointer;transition:var(--ease)}
    .nav-btn:hover,.nav-btn.active{background:var(--sky-lt);color:var(--sky-dk)}
    .page{display:none;padding-top:calc(var(--hh) + 36px);padding-bottom:60px;min-height:100vh}
    .page.on{display:block}
    .btn{display:inline-flex;align-items:center;gap:5px;padding:9px 20px;border-radius:var(--r);font-size:14px;font-weight:700;transition:var(--ease);cursor:pointer;white-space:nowrap}
    .btn-sm{padding:6px 13px;font-size:13px}
    .btn-p{background:var(--sky);color:#fff;border:1.5px solid var(--sky)}
    .btn-p:hover{background:var(--sky-dk);border-color:var(--sky-dk);box-shadow:0 4px 14px rgba(91,171,245,.32);transform:translateY(-1px)}
    .btn-o{background:transparent;color:var(--sky-dk);border:1.5px solid var(--sky-mid)}
    .btn-o:hover{background:var(--sky-lt);border-color:var(--sky)}
    .btn-g{background:transparent;color:var(--text-2);border:1.5px solid transparent}
    .btn-g:hover{background:var(--border-lt)}
    .btn-d{background:transparent;color:var(--red);border:1.5px solid #FECACA}
    .btn-d:hover{background:var(--red-lt)}

    /* 결정사항 */
    .dec-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;gap:12px;flex-wrap:wrap}
    .dec-title{font-size:24px;font-weight:800;letter-spacing:-.4px}
    .dec-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
    .dec-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r-md);padding:20px;display:flex;flex-direction:column;gap:10px;transition:var(--ease)}
    .dec-card:hover{box-shadow:var(--sh-md);border-color:var(--sky-mid)}
    .dec-card-title{font-size:16px;font-weight:700;color:var(--text-1)}
    .dec-card-preview{font-size:13px;color:var(--text-3);line-height:1.6;overflow:hidden;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;white-space:pre-wrap}
    .dec-card-date{font-size:12px;color:var(--text-3)}
    .dec-card-actions{display:flex;gap:6px;padding-top:8px;border-top:1px solid var(--border-lt);opacity:0;transition:var(--ease)}
    .dec-card:hover .dec-card-actions{opacity:1}
    /* 결정사항 모달 */
    .dec-overlay{position:fixed;inset:0;z-index:200;background:rgba(18,28,42,.45);backdrop-filter:blur(3px);display:none;align-items:center;justify-content:center;padding:20px}
    .dec-overlay.on{display:flex}
    .dec-modal{background:var(--white);border-radius:var(--r-lg);width:100%;max-width:600px;max-height:88vh;overflow-y:auto;box-shadow:0 16px 60px rgba(18,28,42,.22);animation:popIn .2s ease}
    @keyframes popIn{from{transform:scale(.96);opacity:0}to{transform:scale(1);opacity:1}}
    .dec-modal-head{padding:22px 24px 16px;border-bottom:1px solid var(--border-lt);display:flex;align-items:center;justify-content:space-between;gap:12px}
    .dec-modal-head-title{font-size:16px;font-weight:800}
    .dec-modal-body{padding:20px 24px;display:flex;flex-direction:column;gap:14px}
    .dec-modal-foot{padding:14px 24px;background:var(--bg);border-top:1px solid var(--border-lt);display:flex;justify-content:flex-end;gap:8px}
    .dec-view-val{font-size:15px;color:var(--text-2);line-height:1.8;white-space:pre-wrap;padding:4px 0}
    @media(max-width:900px){.dec-grid{grid-template-columns:repeat(2,1fr)}}
    @media(max-width:600px){.dec-grid{grid-template-columns:1fr}.dec-card-actions{opacity:1}}
    .toast{position:fixed;bottom:24px;right:24px;background:var(--text-1);color:#fff;padding:12px 20px;border-radius:var(--r);font-size:14px;font-weight:500;box-shadow:var(--sh-md);z-index:9999;opacity:0;transform:translateY(12px);pointer-events:none;transition:.2s ease}
    .toast.on{opacity:1;transform:translateY(0)}
    .list-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;gap:12px;flex-wrap:wrap}
    .list-title{font-size:24px;font-weight:800;letter-spacing:-.4px}
    .list-sub{font-size:13px;color:var(--text-3);margin-top:3px}
    .search-row{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
    .search-wrap{position:relative;flex:1;min-width:200px}
    .search-ic{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text-3);font-size:15px;pointer-events:none}
    .search-inp{width:100%;padding:10px 14px 10px 36px;border:1.5px solid var(--border);border-radius:var(--r);font-size:14px;background:var(--white);color:var(--text-1);transition:var(--ease)}
    .search-inp:focus{outline:none;border-color:var(--sky);box-shadow:0 0 0 3px rgba(91,171,245,.12)}
    .filter-sel{padding:9px 12px;border:1.5px solid var(--border);border-radius:var(--r);font-size:13px;color:var(--text-2);background:var(--white);cursor:pointer}
    .list-count{font-size:13px;color:var(--text-3);margin-bottom:16px}
    .list-count strong{color:var(--text-1);font-weight:700}
    .m-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
    .m-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r-md);padding:20px;display:flex;flex-direction:column;gap:10px;transition:var(--ease);cursor:pointer}
    .m-card:hover{box-shadow:var(--sh-md);border-color:var(--sky-mid);transform:translateY(-2px)}
    .m-card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
    .m-card-title{font-size:16px;font-weight:700;color:var(--text-1);line-height:1.4}
    .m-card-date{font-size:13px;color:var(--text-3);white-space:nowrap;flex-shrink:0}
    .m-card-keywords{display:flex;flex-wrap:wrap;gap:5px}
    .kw-chip{background:var(--sky-lt);color:var(--sky-dk);padding:2px 9px;border-radius:20px;font-size:12px;font-weight:600}
    .m-card-actions{display:flex;gap:6px;margin-top:auto;padding-top:8px;border-top:1px solid var(--border-lt);opacity:0;transition:var(--ease)}
    .m-card:hover .m-card-actions{opacity:1}
    .empty{grid-column:span 3;text-align:center;padding:60px 20px;color:var(--text-3)}
    .empty-icon{font-size:40px;margin-bottom:12px}
    .empty p{font-size:15px;font-weight:600;margin-bottom:6px;color:var(--text-2)}
    .spinner{grid-column:span 3;text-align:center;padding:48px;color:var(--text-3);font-size:14px}
    .write-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;gap:12px;flex-wrap:wrap}
    .write-title{font-size:24px;font-weight:800;letter-spacing:-.4px}
    .form{display:flex;flex-direction:column;gap:16px}
    .fsec{background:var(--white);border:1px solid var(--border);border-radius:var(--r-md);overflow:hidden}
    .fsec-head{padding:13px 22px;background:var(--bg);border-bottom:1px solid var(--border-lt);font-size:12px;font-weight:800;color:var(--sky-dk);letter-spacing:.05em;text-transform:uppercase}
    .fsec-body{padding:20px 22px;display:flex;flex-direction:column;gap:14px}
    .fg2{display:grid;grid-template-columns:2fr 1fr;gap:14px}
    .fgroup{display:flex;flex-direction:column;gap:6px}
    .flabel{font-size:13px;font-weight:700;color:var(--text-2)}
    .flabel .req{color:var(--sky)}
    .finput{padding:10px 13px;border:1.5px solid var(--border);border-radius:var(--r);font-size:14px;color:var(--text-1);background:var(--white);transition:var(--ease)}
    .finput:focus{outline:none;border-color:var(--sky);box-shadow:0 0 0 3px rgba(91,171,245,.11)}
    .finput::placeholder{color:var(--text-3)}
    textarea.finput{resize:vertical;min-height:100px;line-height:1.65}
    .att-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
    .att-list{display:flex;flex-wrap:wrap;gap:7px}
    .att-item{display:flex;align-items:center;gap:6px;padding:6px 13px;border:1.5px solid var(--border);border-radius:20px;cursor:pointer;font-size:14px;font-weight:600;color:var(--text-2);background:var(--white);transition:var(--ease);user-select:none}
    .att-item input[type=checkbox]{accent-color:var(--sky);width:14px;height:14px;cursor:pointer}
    .att-item.checked{background:var(--sky-lt);border-color:var(--sky-mid);color:var(--sky-dk)}
    .att-extra-wrap{display:flex;gap:7px;align-items:center}
    .att-add-inp{padding:7px 11px;border:1.5px dashed var(--border);border-radius:var(--r);font-size:13px;color:var(--text-1);background:var(--white);transition:var(--ease);width:160px}
    .att-add-inp:focus{outline:none;border-color:var(--sky);border-style:solid}
    .att-add-inp::placeholder{color:var(--text-3)}
    .form-actions{display:flex;justify-content:flex-end;gap:8px;padding-bottom:4px}
    .detail-topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;flex-wrap:wrap;gap:12px}
    .detail-actions{display:flex;gap:8px}
    .detail-doc{background:var(--white);border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--sh);overflow:hidden}
    .detail-doc-header{padding:32px 36px 26px;border-bottom:1px solid var(--border-lt);background:linear-gradient(135deg,#F6FBFF 0%,#fff 100%)}
    .detail-doc-title{font-size:26px;font-weight:800;letter-spacing:-.4px;margin-bottom:10px}
    .detail-doc-meta{display:flex;gap:16px;font-size:14px;color:var(--text-3);flex-wrap:wrap}
    .detail-atts{display:flex;flex-wrap:wrap;gap:7px;margin-top:14px}
    .detail-att-chip{background:var(--sky-lt);color:var(--sky-dk);padding:3px 12px;border-radius:20px;font-size:13px;font-weight:600}
    .detail-kws{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
    .detail-sec{padding:22px 36px;border-bottom:1px solid var(--border-lt)}
    .detail-sec:last-child{border-bottom:none}
    .detail-sec-label{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--sky-dk);margin-bottom:10px}
    .detail-sec-val{font-size:15px;color:var(--text-2);line-height:1.8;white-space:pre-wrap}
    @media(max-width:900px){.m-grid{grid-template-columns:repeat(2,1fr)}.empty,.spinner{grid-column:span 2}}
    @media(max-width:600px){.wrap{padding:0 16px}.m-grid{grid-template-columns:1fr}.empty,.spinner{grid-column:span 1}.fg2{grid-template-columns:1fr}.m-card-actions{opacity:1}.detail-doc-header{padding:20px}.detail-sec{padding:16px 20px}}
  </style>
</head>
<body>
<header class="hdr">
  <div class="hdr-inner">
    <div class="logo" onclick="go('list')"><span class="logo-mark">M</span>eFTTS MeetNote</div>
    <nav class="nav">
      <button class="nav-btn" id="nav-list" onclick="go('list')">회의록 목록</button>
      <button class="nav-btn" id="nav-write" onclick="go('write')">새 회의록</button>
      <button class="nav-btn" id="nav-decisions" onclick="go('decisions')">결정사항</button>
    </nav>
  </div>
</header>

<div id="page-list" class="page">
  <div class="wrap">
    <div class="list-header">
      <div><div class="list-title">회의록 목록</div><div class="list-sub" id="listSub">저장된 회의록</div></div>
      <button class="btn btn-p" onclick="go('write')">+ 새 회의록</button>
    </div>
    <div class="search-row">
      <div class="search-wrap">
        <span class="search-ic">🔍</span>
        <input class="search-inp" id="searchInp" type="text" placeholder="제목, 키워드 검색..." oninput="filterList()" />
      </div>
      <select class="filter-sel" id="filterDate" onchange="filterList()"><option value="">전체 기간</option></select>
    </div>
    <div class="list-count" id="listCount"></div>
    <div class="m-grid" id="mCards"><div class="spinner">불러오는 중...</div></div>
  </div>
</div>

<div id="page-write" class="page">
  <div class="wrap">
    <div class="write-header">
      <div class="write-title" id="writePageTitle">새 회의록 작성</div>
      <button class="btn btn-g" onclick="goListSave()">← 목록으로</button>
    </div>
    <div class="form">
      <div class="fsec">
        <div class="fsec-head">기본 정보</div>
        <div class="fsec-body">
          <div class="fg2">
            <div class="fgroup">
              <label class="flabel">회의 제목 <span class="req">*</span></label>
              <input class="finput" id="f-title" type="text" placeholder="예: 6월 3주차 팀 회의" />
            </div>
            <div class="fgroup">
              <label class="flabel">회의 날짜</label>
              <input class="finput" id="f-date" type="date" />
            </div>
          </div>
          <div class="fgroup">
            <label class="flabel">참석자</label>
            <div class="att-row">
              <div class="att-list" id="attList"></div>
              <div class="att-extra-wrap">
                <input class="att-add-inp" id="attAddInp" type="text" placeholder="+ 추가 후 Enter" onkeydown="handleAttKey(event)" />
                <button class="btn btn-o btn-sm" onclick="addAttFromInput()">추가</button>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="fsec">
        <div class="fsec-head">회의 내용</div>
        <div class="fsec-body">
          <div class="fgroup">
            <label class="flabel">안건</label>
            <textarea class="finput" id="f-agenda" rows="3" placeholder="1. 첫 번째 안건"></textarea>
          </div>
          <div class="fgroup">
            <label class="flabel">주요 논의 내용</label>
            <textarea class="finput" id="f-discussion" rows="6" placeholder="회의에서 논의된 주요 내용을 기록하세요"></textarea>
          </div>
          <div class="fgroup">
            <label class="flabel">결정사항</label>
            <textarea class="finput" id="f-decisions" rows="4" placeholder="회의에서 결정된 사항을 기록하세요"></textarea>
          </div>
          <div class="fgroup">
            <label class="flabel">주요 키워드</label>
            <input class="finput" id="f-keywords" type="text" placeholder="예: Q3, 마케팅, 예산 (쉼표로 구분)" />
          </div>
        </div>
      </div>
      <div class="form-actions">
        <button class="btn btn-g" onclick="goListSave()">목록으로</button>
        <button class="btn btn-p" onclick="saveMeeting()">저장하기</button>
      </div>
    </div>
  </div>
</div>

<div id="page-detail" class="page">
  <div class="wrap">
    <div class="detail-topbar">
      <button class="btn btn-g" onclick="go('list')">← 목록으로</button>
      <div class="detail-actions">
        <button class="btn btn-o btn-sm" onclick="editCurrent()">수정</button>
        <button class="btn btn-d btn-sm" onclick="deleteCurrent()">삭제</button>
      </div>
    </div>
    <div id="detailContent"></div>
  </div>
</div>


<!-- 결정사항 페이지 -->
<div id="page-decisions" class="page">
  <div class="wrap">
    <div class="dec-header">
      <div><div class="dec-title">결정사항</div></div>
      <button class="btn btn-p" onclick="openDecModal()">+ 추가</button>
    </div>
    <div class="search-row">
      <div class="search-wrap">
        <span class="search-ic">🔍</span>
        <input class="search-inp" id="decSearchInp" type="text" placeholder="제목 검색..." oninput="filterDecisions()" />
      </div>
    </div>
    <div class="list-count" id="decCount"></div>
    <div class="dec-grid" id="decCards"><div class="spinner">불러오는 중...</div></div>
  </div>
</div>

<!-- 결정사항 작성/수정 모달 -->
<div class="dec-overlay" id="decOverlay" onclick="closeDecModal(event)">
  <div class="dec-modal">
    <div class="dec-modal-head">
      <div class="dec-modal-head-title" id="decModalTitle">결정사항 추가</div>
      <button class="modal-close" onclick="closeDecModalDirect()">✕</button>
    </div>
    <div class="dec-modal-body">
      <div class="fgroup">
        <label class="flabel">제목 <span class="req">*</span></label>
        <input class="finput" id="dec-title" type="text" placeholder="결정사항 제목을 입력하세요" />
      </div>
      <div class="fgroup">
        <label class="flabel">내용</label>
        <textarea class="finput" id="dec-content" rows="8" placeholder="결정된 내용을 자세히 작성하세요"></textarea>
      </div>
    </div>
    <div class="dec-modal-foot">
      <button class="btn btn-g" onclick="closeDecModalDirect()">취소</button>
      <button class="btn btn-p" onclick="saveDecision()">저장하기</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const API='https://eftts-meetnote.onrender.com/api';
const DEFAULT_ATT=['노환지','김진우','김주화'];
let state={meetings:[],attendees:DEFAULT_ATT.map(n=>({name:n,checked:true})),editId:null,currentDetailId:null};

function go(page,id,push){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('on');
  var nb=document.getElementById('nav-'+page);if(nb)nb.classList.add('active');
  window.scrollTo(0,0);
  if(push!==false)history.pushState({page:page,id:id||null},'','?p='+page+(id?'&id='+id:''));
  if(page==='list')loadList();
  if(page==='write')initWrite(id||null);
  if(page==='detail')renderDetail(id);
  if(page==='decisions')loadDecisions();
}
window.addEventListener('popstate',function(e){
  var s=e.state;
  if(s&&s.page)go(s.page,s.id||null,false);
  else go('list',null,false);
});

function goListSave(){
  var title=document.getElementById('f-title').value.trim();
  if(title)saveMeeting(true);else go('list');
}

async function loadList(){
  document.getElementById('mCards').innerHTML='<div class="spinner">불러오는 중...</div>';
  try{
    var res=await fetch(API+'/meetings');
    state.meetings=await res.json();
    populateDateFilter();renderList(state.meetings);
  }catch(e){
    document.getElementById('mCards').innerHTML='<div class="empty"><div class="empty-icon">⚠️</div><p>서버에 연결할 수 없습니다</p></div>';
  }
}

function populateDateFilter(){
  var sel=document.getElementById('filterDate');
  var months=new Set(state.meetings.map(m=>m.date&&m.date.slice(0,7)).filter(Boolean));
  sel.innerHTML='<option value="">전체 기간</option>';
  [...months].sort().reverse().forEach(ym=>{
    var parts=ym.split('-');
    var opt=document.createElement('option');
    opt.value=ym;opt.textContent=parts[0]+'년 '+parseInt(parts[1])+'월';
    sel.appendChild(opt);
  });
}

function filterList(){
  var q=document.getElementById('searchInp').value.toLowerCase();
  var month=document.getElementById('filterDate').value;
  renderList(state.meetings.filter(m=>{
    var mQ=!q||m.title&&m.title.toLowerCase().includes(q)||(m.keywords||[]).some(k=>k.toLowerCase().includes(q));
    var mM=!month||m.date&&m.date.startsWith(month);
    return mQ&&mM;
  }));
}

function renderList(data){
  document.getElementById('listCount').innerHTML='총 <strong>'+data.length+'개</strong>';
  document.getElementById('listSub').textContent='저장된 회의록 '+state.meetings.length+'개';
  var grid=document.getElementById('mCards');
  if(!data.length){grid.innerHTML='<div class="empty"><div class="empty-icon">📄</div><p>회의록이 없습니다</p><span>첫 번째 회의록을 작성해보세요</span></div>';return;}
  grid.innerHTML=data.map(m=>`
    <div class="m-card" onclick="go('detail','${m.id}')">
      <div class="m-card-top">
        <div class="m-card-title">${esc(m.title)}</div>
        <div class="m-card-date">${fmtShort(m.date)}</div>
      </div>
      ${m.keywords&&m.keywords.length?'<div class="m-card-keywords">'+m.keywords.map(k=>'<span class="kw-chip">'+esc(k)+'</span>').join('')+'</div>':''}
      <div class="m-card-actions" onclick="event.stopPropagation()">
        <button class="btn btn-o btn-sm" onclick="go('detail','${m.id}')">보기</button>
        <button class="btn btn-g btn-sm" onclick="go('write','${m.id}')">수정</button>
        <button class="btn btn-d btn-sm" onclick="deleteMeeting('${m.id}')">삭제</button>
      </div>
    </div>`).join('');
}

function initWrite(editId){
  state.editId=editId||null;
  state.attendees=DEFAULT_ATT.map(n=>({name:n,checked:true}));
  document.getElementById('writePageTitle').textContent=editId?'회의록 수정':'새 회의록 작성';
  ['f-title','f-agenda','f-discussion','f-decisions','f-keywords'].forEach(id=>{var el=document.getElementById(id);if(el)el.value='';});
  document.getElementById('f-date').value=today();
  renderAttendees();
  if(editId){
    var m=state.meetings.find(x=>x.id===editId);
    if(m){
      document.getElementById('f-title').value=m.title||'';
      document.getElementById('f-date').value=m.date||today();
      document.getElementById('f-agenda').value=m.agenda||'';
      document.getElementById('f-discussion').value=m.discussion||'';
      document.getElementById('f-decisions').value=m.decisions||'';
      document.getElementById('f-keywords').value=(m.keywords||[]).join(', ');
      var saved=m.attendees||[];
      state.attendees=DEFAULT_ATT.map(n=>({name:n,checked:saved.includes(n)}));
      saved.filter(n=>!DEFAULT_ATT.includes(n)).forEach(n=>state.attendees.push({name:n,checked:true}));
      renderAttendees();
    }
  }
}

function renderAttendees(){
  document.getElementById('attList').innerHTML=state.attendees.map((a,i)=>
    '<label class="att-item '+(a.checked?'checked':'')+'" onclick="toggleAtt('+i+',event)"><input type="checkbox" '+(a.checked?'checked':'')+' onchange="toggleAtt('+i+',event)" />'+esc(a.name)+'</label>').join('');
}
function toggleAtt(idx,e){e.stopPropagation();state.attendees[idx].checked=!state.attendees[idx].checked;renderAttendees();}
function handleAttKey(e){if(e.key==='Enter'){e.preventDefault();addAttFromInput();}}
function addAttFromInput(){
  var inp=document.getElementById('attAddInp');
  inp.value.split(/[,\s]+/).map(s=>s.trim()).filter(Boolean).forEach(n=>{if(!state.attendees.find(a=>a.name===n))state.attendees.push({name:n,checked:true});});
  inp.value='';renderAttendees();
}

async function saveMeeting(silent){
  var title=document.getElementById('f-title').value.trim();
  if(!title){if(!silent){toast('⚠️ 회의 제목을 입력해주세요.');document.getElementById('f-title').focus();}else go('list');return;}
  var keywords=document.getElementById('f-keywords').value.split(',').map(s=>s.trim()).filter(Boolean);
  var payload={title:title,date:document.getElementById('f-date').value,keywords:keywords,
    attendees:state.attendees.filter(a=>a.checked).map(a=>a.name),
    agenda:document.getElementById('f-agenda').value.trim(),
    discussion:document.getElementById('f-discussion').value.trim(),
    decisions:document.getElementById('f-decisions').value.trim()};
  try{
    if(state.editId){
      await fetch(API+'/meetings/'+state.editId,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
      if(!silent)toast('✓ 수정되었습니다.');
    }else{
      await fetch(API+'/meetings',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
      if(!silent)toast('✓ 저장되었습니다.');
    }
    setTimeout(function(){go('list');},silent?0:600);
  }catch(e){if(!silent)toast('❌ 저장 실패');else go('list');}
}

function renderDetail(id){
  state.currentDetailId=id;
  var m=state.meetings.find(x=>x.id===id);
  if(!m){go('list');return;}
  function sec(label,val){if(!val)return'';return'<div class="detail-sec"><div class="detail-sec-label">'+label+'</div><div class="detail-sec-val">'+esc(val)+'</div></div>';}
  var kwSec=m.keywords&&m.keywords.length?sec('주요 키워드',m.keywords.join(', ')):''; 
  document.getElementById('detailContent').innerHTML=
    '<div class="detail-doc"><div class="detail-doc-header">'+
    '<div class="detail-doc-title">'+esc(m.title)+'</div>'+
    '<div class="detail-doc-meta"><span>📅 '+fmtDate(m.date)+'</span>'+(m.attendees&&m.attendees.length?'<span>'+m.attendees.join(', ')+'</span>':'')+'</div>'+
    (m.keywords&&m.keywords.length?'<div style="margin-top:10px;color:var(--sky-dk);font-size:14px;font-weight:600">'+m.keywords.join(' · ')+'</div>':'')+
    '</div><div>'+sec('안건',m.agenda)+sec('주요 논의 내용',m.discussion)+sec('결정사항',m.decisions)+kwSec+'</div></div>';
}

function editCurrent(){go('write',state.currentDetailId);}
async function deleteCurrent(){
  if(!confirm('이 회의록을 삭제하시겠습니까?'))return;
  try{await fetch(API+'/meetings/'+state.currentDetailId,{method:'DELETE'});toast('삭제되었습니다.');setTimeout(function(){go('list');},400);}catch(e){toast('❌ 삭제 실패');}
}
async function deleteMeeting(id){
  if(!confirm('이 회의록을 삭제하시겠습니까?'))return;
  try{await fetch(API+'/meetings/'+id,{method:'DELETE'});toast('삭제되었습니다.');loadList();}catch(e){toast('❌ 삭제 실패');}
}

function today(){return new Date().toISOString().split('T')[0];}
function fmtDate(d){if(!d)return'—';var dt=new Date(d+'T00:00:00');var days=['일','월','화','수','목','금','토'];return dt.getFullYear()+'. '+(dt.getMonth()+1)+'. '+dt.getDate()+' ('+days[dt.getDay()]+')';}
function fmtShort(d){if(!d)return'—';var dt=new Date(d+'T00:00:00');return(dt.getMonth()+1)+'/'+(dt.getDate());}
function esc(str){if(!str)return'';return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
var toastTid;
function toast(msg){var el=document.getElementById('toast');el.textContent=msg;el.classList.add('on');clearTimeout(toastTid);toastTid=setTimeout(function(){el.classList.remove('on');},2600);}


/* ── 결정사항 ── */
var decState = { decisions:[], editId:null };

async function loadDecisions(){
  document.getElementById('decCards').innerHTML='<div class="spinner">불러오는 중...</div>';
  try{
    var res=await fetch(API+'/decisions');
    decState.decisions=await res.json();
    filterDecisions();
  }catch(e){
    document.getElementById('decCards').innerHTML='<div class="empty"><div class="empty-icon">⚠️</div><p>서버에 연결할 수 없습니다</p></div>';
  }
}

function filterDecisions(){
  var q=document.getElementById('decSearchInp').value.toLowerCase();
  var filtered=decState.decisions.filter(d=>!q||d.title&&d.title.toLowerCase().includes(q));
  renderDecisions(filtered);
}

function renderDecisions(data){
  document.getElementById('decCount').innerHTML='총 <strong>'+data.length+'개</strong>';
  var grid=document.getElementById('decCards');
  if(!data.length){grid.innerHTML='<div class="empty" style="grid-column:span 3"><div class="empty-icon">📋</div><p>결정사항이 없습니다</p><span>추가 버튼을 눌러 작성해보세요</span></div>';return;}
  grid.innerHTML=data.map(d=>`
    <div class="dec-card">
      <div class="dec-card-title">${esc(d.title)}</div>
      ${d.content?'<div class="dec-card-preview">'+esc(d.content)+'</div>':''}
      <div class="dec-card-date">수정일: ${fmtDate(d.updatedAt?d.updatedAt.slice(0,10):d.createdAt?d.createdAt.slice(0,10):'')}</div>
      <div class="dec-card-actions">
        <button class="btn btn-o btn-sm" onclick="viewDecision('${d.id}')">보기</button>
        <button class="btn btn-g btn-sm" onclick="openDecModal('${d.id}')">수정</button>
        <button class="btn btn-d btn-sm" onclick="deleteDecision('${d.id}')">삭제</button>
      </div>
    </div>`).join('');
}

function openDecModal(id){
  decState.editId=id||null;
  document.getElementById('decModalTitle').textContent=id?'결정사항 수정':'결정사항 추가';
  document.getElementById('dec-title').value='';
  document.getElementById('dec-content').value='';
  if(id){
    var d=decState.decisions.find(x=>x.id===id);
    if(d){
      document.getElementById('dec-title').value=d.title||'';
      document.getElementById('dec-content').value=d.content||'';
    }
  }
  document.getElementById('decOverlay').classList.add('on');
  document.body.style.overflow='hidden';
  setTimeout(function(){document.getElementById('dec-title').focus();},100);
}

function closeDecModal(e){
  if(e.target===document.getElementById('decOverlay'))closeDecModalDirect();
}
function closeDecModalDirect(){
  document.getElementById('decOverlay').classList.remove('on');
  document.body.style.overflow='';
}

async function saveDecision(){
  var title=document.getElementById('dec-title').value.trim();
  if(!title){toast('⚠️ 제목을 입력해주세요.');document.getElementById('dec-title').focus();return;}
  var payload={title:title,content:document.getElementById('dec-content').value.trim()};
  try{
    if(decState.editId){
      await fetch(API+'/decisions/'+decState.editId,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
      toast('✓ 수정되었습니다.');
    }else{
      await fetch(API+'/decisions',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
      toast('✓ 저장되었습니다.');
    }
    closeDecModalDirect();
    await loadDecisions();
  }catch(e){toast('❌ 저장 실패');}
}

function viewDecision(id){
  var d=decState.decisions.find(x=>x.id===id);
  if(!d)return;
  document.getElementById('decViewTitle').textContent=d.title||'';
  document.getElementById('decViewContent').textContent=d.content||'';
  var dateStr=d.updatedAt?d.updatedAt.slice(0,10):d.createdAt?d.createdAt.slice(0,10):'';
  document.getElementById('decViewDate').textContent='수정일: '+fmtDate(dateStr);
  decState.viewId=id;
  document.getElementById('decViewOverlay').classList.add('on');
  document.body.style.overflow='hidden';
}
function closeDecView(e){if(e.target===document.getElementById('decViewOverlay'))closeDecViewDirect();}
function closeDecViewDirect(){document.getElementById('decViewOverlay').classList.remove('on');document.body.style.overflow='';}
function editFromView(){closeDecViewDirect();openDecModal(decState.viewId);}

async function deleteDecision(id){
  if(!confirm('삭제하시겠습니까?'))return;
  try{
    await fetch(API+'/decisions/'+id,{method:'DELETE'});
    toast('삭제되었습니다.');
    await loadDecisions();
  }catch(e){toast('❌ 삭제 실패');}
}
window.addEventListener('beforeunload',function(){
  var page=document.querySelector('.page.on');
  if(page&&page.id==='page-write'){var title=document.getElementById('f-title').value.trim();if(title)saveMeeting(true);}
});
window.addEventListener('DOMContentLoaded',function(){go('list');});
</script>
</body>
</html>
