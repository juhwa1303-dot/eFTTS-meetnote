<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>eFTTS MeetNote</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet" />
  <style>
    /* ── 변수 ─────────────────────────────────── */
    :root {
      --sky:        #5BABF5;
      --sky-lt:     #EBF5FE;
      --sky-mid:    #BDE0FC;
      --sky-dk:     #2E86D4;
      --white:      #FFFFFF;
      --bg:         #F4F8FC;
      --card:       #FFFFFF;
      --border:     #DDE8F2;
      --border-lt:  #EDF3F9;
      --text-1:     #18242F;
      --text-2:     #465770;
      --text-3:     #8A9BB0;
      --green:      #22C55E;
      --green-lt:   #DCFCE7;
      --red:        #EF4444;
      --red-lt:     #FEE2E2;
      --orange-lt:  #FEF3C7;
      --sh-sm:      0 1px 4px rgba(60,110,170,.07);
      --sh:         0 2px 14px rgba(60,110,170,.10);
      --sh-md:      0 4px 28px rgba(60,110,170,.13);
      --r:          8px;
      --r-md:       12px;
      --r-lg:       16px;
      --hh:         56px;
      --ease:       .16s ease;
      --font:       'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    }

    /* ── 리셋 ─────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text-1);
      font-size: 14px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }
    button  { font-family: var(--font); cursor: pointer; border: none; background: none; }
    input, select, textarea { font-family: var(--font); }
    a { color: inherit; text-decoration: none; cursor: pointer; }

    /* ── 레이아웃 ─────────────────────────────── */
    .wrap    { max-width: 1200px; margin: 0 auto; padding: 0 32px; }
    .wrap-sm { max-width: 960px;  margin: 0 auto; padding: 0 32px; }

    /* ── 헤더 ─────────────────────────────────── */
    .hdr {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      height: var(--hh);
      background: rgba(255,255,255,.94);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
      box-shadow: var(--sh-sm);
    }
    .hdr-inner {
      max-width: 1200px; margin: 0 auto; padding: 0 32px;
      height: var(--hh);
      display: flex; align-items: center; gap: 24px;
    }
    .logo {
      display: flex; align-items: center; gap: 7px;
      font-weight: 800; font-size: 17px; letter-spacing: -.3px;
      color: var(--text-1); cursor: pointer; flex-shrink: 0;
    }
    .logo-mark {
      width: 26px; height: 26px; border-radius: 7px;
      background: var(--sky);
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 13px; font-weight: 900;
    }
    .nav { display: flex; gap: 2px; flex: 1; }
    .nav-btn {
      padding: 5px 12px; border-radius: var(--r);
      font-size: 13px; font-weight: 600;
      color: var(--text-2); cursor: pointer;
      transition: var(--ease);
    }
    .nav-btn:hover        { background: var(--sky-lt); color: var(--sky-dk); }
    .nav-btn.active       { background: var(--sky-lt); color: var(--sky-dk); }
    .hdr-right { margin-left: auto; }

    /* ── 페이지 시스템 ────────────────────────── */
    .page { display: none; padding-top: calc(var(--hh) + 32px); padding-bottom: 60px; min-height: 100vh; }
    .page.on { display: block; }

    /* ── 버튼 ─────────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 8px 18px; border-radius: var(--r);
      font-size: 13px; font-weight: 700;
      transition: var(--ease); cursor: pointer; white-space: nowrap;
    }
    .btn-sm  { padding: 5px 12px; font-size: 12px; }
    .btn-p   { background: var(--sky); color: #fff; border: 1.5px solid var(--sky); }
    .btn-p:hover   { background: var(--sky-dk); border-color: var(--sky-dk); box-shadow: 0 4px 14px rgba(91,171,245,.32); transform: translateY(-1px); }
    .btn-o   { background: transparent; color: var(--sky-dk); border: 1.5px solid var(--sky-mid); }
    .btn-o:hover   { background: var(--sky-lt); border-color: var(--sky); }
    .btn-g   { background: transparent; color: var(--text-2); border: 1.5px solid transparent; }
    .btn-g:hover   { background: var(--border-lt); }
    .btn-d   { background: transparent; color: var(--red); border: 1.5px solid #FECACA; }
    .btn-d:hover   { background: var(--red-lt); }

    /* ── 배지 ─────────────────────────────────── */
    .badge {
      display: inline-flex; align-items: center;
      padding: 2px 9px; border-radius: 20px;
      font-size: 11px; font-weight: 700;
    }
    .badge-done  { background: var(--green-lt); color: #16A34A; }
    .badge-prog  { background: var(--orange-lt); color: #D97706; }

    /* ── 토스트 ───────────────────────────────── */
    .toast {
      position: fixed; bottom: 24px; right: 24px;
      background: var(--text-1); color: #fff;
      padding: 11px 18px; border-radius: var(--r);
      font-size: 13px; font-weight: 500;
      box-shadow: var(--sh-md); z-index: 9999;
      opacity: 0; transform: translateY(12px);
      pointer-events: none; transition: .2s ease;
      max-width: 300px;
    }
    .toast.on { opacity: 1; transform: translateY(0); }

    /* ══════════════════════════════════════════
       목록 페이지
    ══════════════════════════════════════════ */
    .list-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px; gap: 12px; flex-wrap: wrap;
    }
    .list-title {
      font-size: 22px; font-weight: 800; letter-spacing: -.4px;
    }
    .list-sub { font-size: 12px; color: var(--text-3); margin-top: 2px; }

    /* 검색 바 */
    .search-row {
      display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap;
    }
    .search-wrap {
      position: relative; flex: 1; min-width: 200px;
    }
    .search-ic {
      position: absolute; left: 11px; top: 50%;
      transform: translateY(-50%);
      color: var(--text-3); font-size: 15px; pointer-events: none;
    }
    .search-inp {
      width: 100%; padding: 9px 12px 9px 34px;
      border: 1.5px solid var(--border);
      border-radius: var(--r); font-size: 13px;
      background: var(--white); color: var(--text-1);
      transition: var(--ease);
    }
    .search-inp:focus {
      outline: none; border-color: var(--sky);
      box-shadow: 0 0 0 3px rgba(91,171,245,.12);
    }
    .filter-sel {
      padding: 8px 10px;
      border: 1.5px solid var(--border); border-radius: var(--r);
      font-size: 12px; color: var(--text-2);
      background: var(--white); cursor: pointer;
    }
    .filter-sel:focus { outline: none; border-color: var(--sky); }

    .list-count { font-size: 12px; color: var(--text-3); margin-bottom: 10px; }
    .list-count strong { color: var(--text-1); font-weight: 700; }

    /* 카드 */
    .m-cards { display: flex; flex-direction: column; gap: 10px; }
    .m-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      padding: 16px 20px;
      display: flex; align-items: center; gap: 14px;
      transition: var(--ease); cursor: pointer;
    }
    .m-card:hover { box-shadow: var(--sh); border-color: var(--sky-mid); }
    .m-card-main { flex: 1; min-width: 0; }
    .m-card-title {
      font-size: 15px; font-weight: 700; margin-bottom: 3px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .m-card-meta {
      display: flex; gap: 10px; font-size: 11px; color: var(--text-3);
      flex-wrap: wrap; margin-bottom: 4px;
    }
    .m-card-keywords {
      display: flex; gap: 5px; flex-wrap: wrap;
    }
    .kw-chip {
      background: var(--sky-lt); color: var(--sky-dk);
      padding: 1px 7px; border-radius: 10px;
      font-size: 11px; font-weight: 600;
    }
    .m-card-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .m-card-actions {
      display: flex; gap: 5px;
      opacity: 0; transition: var(--ease);
    }
    .m-card:hover .m-card-actions { opacity: 1; }

    /* 빈 상태 */
    .empty {
      text-align: center; padding: 56px 20px;
      color: var(--text-3);
    }
    .empty-icon { font-size: 40px; margin-bottom: 12px; }
    .empty p { font-size: 14px; font-weight: 600; margin-bottom: 6px; color: var(--text-2); }
    .empty span { font-size: 12px; }

    /* ══════════════════════════════════════════
       작성 페이지
    ══════════════════════════════════════════ */
    .write-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 24px; gap: 12px; flex-wrap: wrap;
    }
    .write-title { font-size: 22px; font-weight: 800; letter-spacing: -.4px; }

    .form { display: flex; flex-direction: column; gap: 16px; }

    /* 섹션 카드 */
    .fsec {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      overflow: hidden;
    }
    .fsec-head {
      padding: 12px 20px;
      background: var(--bg);
      border-bottom: 1px solid var(--border-lt);
      font-size: 12px; font-weight: 800;
      color: var(--sky-dk);
      letter-spacing: .05em; text-transform: uppercase;
    }
    .fsec-body { padding: 20px; display: flex; flex-direction: column; gap: 14px; }

    /* 그리드 */
    .fg2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .fgroup { display: flex; flex-direction: column; gap: 5px; }
    .fgroup.full { grid-column: span 2; }
    .flabel {
      font-size: 12px; font-weight: 700; color: var(--text-2);
    }
    .flabel .req { color: var(--sky); }
    .finput {
      padding: 9px 12px;
      border: 1.5px solid var(--border); border-radius: var(--r);
      font-size: 13px; color: var(--text-1);
      background: var(--white); transition: var(--ease);
    }
    .finput:focus {
      outline: none; border-color: var(--sky);
      box-shadow: 0 0 0 3px rgba(91,171,245,.11);
    }
    .finput::placeholder { color: var(--text-3); }
    textarea.finput {
      resize: vertical; min-height: 100px; line-height: 1.65;
    }

    /* 키워드 태그 입력 */
    .tag-wrap {
      display: flex; flex-wrap: wrap; gap: 6px; align-items: center;
      min-height: 40px; padding: 6px 10px;
      border: 1.5px solid var(--border); border-radius: var(--r);
      background: var(--white); cursor: text;
      transition: var(--ease);
    }
    .tag-wrap:focus-within {
      border-color: var(--sky);
      box-shadow: 0 0 0 3px rgba(91,171,245,.11);
    }
    .tag-item {
      display: inline-flex; align-items: center; gap: 4px;
      background: var(--sky-lt); color: var(--sky-dk);
      padding: 2px 8px 2px 10px; border-radius: 20px;
      font-size: 12px; font-weight: 600;
    }
    .tag-item button {
      width: 14px; height: 14px; border-radius: 50%;
      background: var(--sky-mid); color: var(--sky-dk);
      font-size: 9px; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .tag-item button:hover { background: var(--sky); color: #fff; }
    .tag-input {
      border: none; outline: none; font-family: var(--font);
      font-size: 12px; color: var(--text-1);
      background: transparent; flex: 1; min-width: 100px;
    }
    .tag-hint { font-size: 11px; color: var(--text-3); margin-top: 3px; }

    /* 참석자 체크박스 */
    .att-list {
      display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 8px;
    }
    .att-item {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 12px;
      border: 1.5px solid var(--border); border-radius: 20px;
      cursor: pointer; font-size: 13px; font-weight: 600;
      color: var(--text-2); background: var(--white);
      transition: var(--ease); user-select: none;
    }
    .att-item input[type="checkbox"] { accent-color: var(--sky); width: 14px; height: 14px; cursor: pointer; }
    .att-item.checked {
      background: var(--sky-lt); border-color: var(--sky-mid);
      color: var(--sky-dk);
    }
    .att-extra-wrap {
      display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
    }
    .att-add-inp {
      flex: 1; min-width: 140px;
      padding: 7px 10px;
      border: 1.5px dashed var(--border); border-radius: var(--r);
      font-size: 12px; color: var(--text-1); background: var(--white);
      transition: var(--ease);
    }
    .att-add-inp:focus { outline: none; border-color: var(--sky); border-style: solid; }
    .att-add-inp::placeholder { color: var(--text-3); }

    /* 폼 액션 */
    .form-actions {
      display: flex; justify-content: flex-end;
      gap: 8px; flex-wrap: wrap; padding-bottom: 4px;
    }

    /* ══════════════════════════════════════════
       상세 모달 (목록에서 클릭)
    ══════════════════════════════════════════ */
    .overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(18,28,42,.45);
      backdrop-filter: blur(3px);
      display: none; align-items: center; justify-content: center;
      padding: 20px;
    }
    .overlay.on { display: flex; }
    .modal {
      background: var(--white);
      border-radius: var(--r-lg);
      width: 100%; max-width: 680px;
      max-height: 88vh; overflow-y: auto;
      box-shadow: 0 16px 60px rgba(18,28,42,.22);
      animation: popIn .22s ease;
    }
    @keyframes popIn {
      from { transform: scale(.96); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }
    .modal-head {
      padding: 22px 24px 18px;
      border-bottom: 1px solid var(--border-lt);
      background: linear-gradient(135deg, #F6FBFF 0%, #fff 100%);
    }
    .modal-head-top {
      display: flex; align-items: flex-start;
      justify-content: space-between; gap: 12px; margin-bottom: 8px;
    }
    .modal-title { font-size: 20px; font-weight: 800; letter-spacing: -.3px; }
    .modal-meta {
      display: flex; gap: 12px; font-size: 12px; color: var(--text-3);
      flex-wrap: wrap;
    }
    .modal-close {
      width: 30px; height: 30px; border-radius: var(--r);
      background: var(--border-lt); color: var(--text-2);
      font-size: 16px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: var(--ease);
    }
    .modal-close:hover { background: var(--red-lt); color: var(--red); }
    .modal-body { padding: 0; }
    .modal-sec {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border-lt);
    }
    .modal-sec:last-child { border-bottom: none; }
    .modal-sec-label {
      font-size: 10px; font-weight: 800;
      text-transform: uppercase; letter-spacing: .08em;
      color: var(--sky-dk); margin-bottom: 8px;
    }
    .modal-sec-val { font-size: 13px; color: var(--text-2); line-height: 1.7; white-space: pre-wrap; }
    .modal-atts { display: flex; flex-wrap: wrap; gap: 5px; }
    .modal-att-chip {
      background: var(--sky-lt); color: var(--sky-dk);
      padding: 2px 10px; border-radius: 20px;
      font-size: 12px; font-weight: 600;
    }
    .modal-kws { display: flex; flex-wrap: wrap; gap: 5px; }
    .modal-foot {
      padding: 14px 24px;
      background: var(--bg); border-top: 1px solid var(--border-lt);
      display: flex; justify-content: flex-end; gap: 8px;
    }

    /* ── 로딩 ─────────────────────────────────── */
    .spinner {
      text-align: center; padding: 48px;
      color: var(--text-3); font-size: 13px;
    }

    @media (max-width: 600px) {
      .fg2 { grid-template-columns: 1fr; }
      .fgroup.full { grid-column: span 1; }
      .m-card { flex-wrap: wrap; }
      .m-card-actions { opacity: 1; }
      .list-header { flex-direction: column; align-items: flex-start; }
      .write-header { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>

<!-- ── 헤더 ──────────────────────────────────── -->
<header class="hdr">
  <div class="hdr-inner">
    <div class="logo" onclick="go('list')">
      <span class="logo-mark">e</span>
      eFTTS MeetNote
    </div>
    <nav class="nav">
      <button class="nav-btn" id="nav-list" onclick="go('list')">회의록 목록</button>
      <button class="nav-btn" id="nav-write" onclick="go('write')">새 회의록</button>
    </nav>
  </div>
</header>

<!-- ══════════════════════════════════════════════
     목록 페이지
══════════════════════════════════════════════ -->
<div id="page-list" class="page">
  <div class="wrap">
    <div class="list-header">
      <div>
        <div class="list-title">회의록 목록</div>
        <div class="list-sub" id="listSub">저장된 회의록</div>
      </div>
      <button class="btn btn-p" onclick="go('write')">+ 새 회의록</button>
    </div>

    <div class="search-row">
      <div class="search-wrap">
        <span class="search-ic">🔍</span>
        <input class="search-inp" id="searchInp" type="text"
               placeholder="제목, 키워드, 참석자 검색..."
               oninput="filterList()" />
      </div>
      <select class="filter-sel" id="filterDate" onchange="filterList()">
        <option value="">전체 기간</option>
      </select>
    </div>

    <div class="list-count" id="listCount"></div>
    <div class="m-cards" id="mCards">
      <div class="spinner">불러오는 중…</div>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════════════
     작성 페이지
══════════════════════════════════════════════ -->
<div id="page-write" class="page">
  <div class="wrap-sm">
    <div class="write-header">
      <div class="write-title" id="writePageTitle">새 회의록 작성</div>
      <button class="btn btn-g" onclick="go('list')">← 목록으로</button>
    </div>

    <div class="form" id="writeForm">

      <!-- 기본 정보 -->
      <div class="fsec">
        <div class="fsec-head">기본 정보</div>
        <div class="fsec-body">
          <div class="fg2">
            <div class="fgroup full">
              <label class="flabel">회의 제목 <span class="req">*</span></label>
              <input class="finput" id="f-title" type="text"
                     placeholder="예: 6월 3주차 팀 회의" />
            </div>
            <div class="fgroup">
              <label class="flabel">회의 날짜</label>
              <input class="finput" id="f-date" type="date" />
            </div>
            <div class="fgroup">
              <label class="flabel">주요 키워드</label>
              <div class="tag-wrap" id="tagWrap" onclick="document.getElementById('tagInput').focus()">
                <!-- 태그 아이템들 JS로 렌더 -->
                <input class="tag-input" id="tagInput"
                       placeholder="입력 후 Enter"
                       onkeydown="handleTagKey(event)" />
              </div>
              <span class="tag-hint">Enter 또는 쉼표로 추가</span>
            </div>
          </div>
          <!-- 참석자 -->
          <div class="fgroup">
            <label class="flabel">참석자</label>
            <div class="att-list" id="attList">
              <!-- JS로 렌더 -->
            </div>
            <div class="att-extra-wrap">
              <input class="att-add-inp" id="attAddInp"
                     type="text" placeholder="+ 다른 참석자 이름 입력 후 Enter"
                     onkeydown="handleAttKey(event)" />
              <button class="btn btn-o btn-sm" onclick="addAttFromInput()">추가</button>
            </div>
          </div>
        </div>
      </div>

      <!-- 회의 내용 -->
      <div class="fsec">
        <div class="fsec-head">회의 내용</div>
        <div class="fsec-body">
          <div class="fgroup">
            <label class="flabel">회의 목적</label>
            <input class="finput" id="f-purpose" type="text"
                   placeholder="이번 회의의 주요 목적" />
          </div>
          <div class="fgroup">
            <label class="flabel">안건</label>
            <textarea class="finput" id="f-agenda" rows="3"
                      placeholder="1. 첫 번째 안건&#10;2. 두 번째 안건"></textarea>
          </div>
          <div class="fgroup">
            <label class="flabel">주요 논의 내용</label>
            <textarea class="finput" id="f-discussion" rows="5"
                      placeholder="회의에서 논의된 주요 내용을 기록하세요"></textarea>
          </div>
          <div class="fgroup">
            <label class="flabel">결정사항</label>
            <textarea class="finput" id="f-decisions" rows="3"
                      placeholder="회의에서 결정된 사항을 기록하세요"></textarea>
          </div>
        </div>
      </div>

      <!-- 저장 버튼 -->
      <div class="form-actions">
        <button class="btn btn-g" onclick="go('list')">취소</button>
        <button class="btn btn-p" onclick="saveMeeting()">저장하기</button>
      </div>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════════════
     상세 모달
══════════════════════════════════════════════ -->
<div class="overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <!-- JS로 렌더 -->
  </div>
</div>

<!-- 토스트 -->
<div class="toast" id="toast"></div>

<script>
/* ══════════════════════════════════════════════
   설정 & 상태
══════════════════════════════════════════════ */
const API = 'https://eftts-meetnote.onrender.com/api';

// 기본 참석자
const DEFAULT_ATT = ['노환지', '김진우', '김주화'];

let state = {
  meetings: [],
  tags: [],
  attendees: [...DEFAULT_ATT.map(n => ({ name: n, checked: true }))],
  editId: null,
};

/* ══════════════════════════════════════════════
   페이지 라우팅
══════════════════════════════════════════════ */
function go(page, id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('on'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`page-${page}`).classList.add('on');
  document.getElementById(`nav-${page}`)?.classList.add('active');
  window.scrollTo(0, 0);

  if (page === 'list') loadList();
  if (page === 'write') initWrite(id || null);
}

/* ══════════════════════════════════════════════
   목록 페이지
══════════════════════════════════════════════ */
async function loadList() {
  document.getElementById('mCards').innerHTML = '<div class="spinner">불러오는 중…</div>';
  try {
    const res = await fetch(`${API}/meetings`);
    state.meetings = await res.json();
    populateDateFilter();
    renderList(state.meetings);
  } catch (e) {
    document.getElementById('mCards').innerHTML =
      `<div class="empty">
         <div class="empty-icon">⚠️</div>
         <p>서버에 연결할 수 없습니다</p>
         <span>터미널에서 <strong>node server.js</strong> 를 실행해주세요</span>
       </div>`;
  }
}

function populateDateFilter() {
  const sel = document.getElementById('filterDate');
  const months = new Set(state.meetings.map(m => m.date?.slice(0, 7)).filter(Boolean));
  sel.innerHTML = '<option value="">전체 기간</option>';
  [...months].sort().reverse().forEach(ym => {
    const [y, mo] = ym.split('-');
    const opt = document.createElement('option');
    opt.value = ym;
    opt.textContent = `${y}년 ${parseInt(mo)}월`;
    sel.appendChild(opt);
  });
}

function filterList() {
  const q     = document.getElementById('searchInp').value.toLowerCase();
  const month = document.getElementById('filterDate').value;

  const filtered = state.meetings.filter(m => {
    const matchQ = !q ||
      m.title?.toLowerCase().includes(q) ||
      (m.keywords || []).some(k => k.toLowerCase().includes(q)) ||
      (m.attendees || []).some(a => a.toLowerCase().includes(q));
    const matchM = !month || m.date?.startsWith(month);
    return matchQ && matchM;
  });
  renderList(filtered);
}

function renderList(data) {
  const count = document.getElementById('listCount');
  const cards = document.getElementById('mCards');
  const sub   = document.getElementById('listSub');

  count.innerHTML = `총 <strong>${data.length}개</strong>`;
  sub.textContent = `저장된 회의록 ${state.meetings.length}개`;

  if (data.length === 0) {
    cards.innerHTML = `
      <div class="empty">
        <div class="empty-icon">📄</div>
        <p>회의록이 없습니다</p>
        <span>첫 번째 회의록을 작성해보세요</span>
      </div>`;
    return;
  }

  cards.innerHTML = data.map(m => `
    <div class="m-card" onclick="openModal('${m.id}')">
      <div class="m-card-main">
        <div class="m-card-title">${esc(m.title)}</div>
        <div class="m-card-meta">
          <span>📅 ${fmtDate(m.date)}</span>
          ${m.attendees?.length ? `<span>👥 ${m.attendees.join(', ')}</span>` : ''}
        </div>
        ${(m.keywords?.length)
          ? `<div class="m-card-keywords">${m.keywords.map(k => `<span class="kw-chip">${esc(k)}</span>`).join('')}</div>`
          : ''}
      </div>
      <div class="m-card-right">
        <div class="m-card-actions" onclick="event.stopPropagation()">
          <button class="btn btn-o btn-sm" onclick="openModal('${m.id}')">보기</button>
          <button class="btn btn-g btn-sm" onclick="editMeeting('${m.id}')">수정</button>
          <button class="btn btn-d btn-sm" onclick="deleteMeeting('${m.id}')">삭제</button>
        </div>
      </div>
    </div>
  `).join('');
}

/* ══════════════════════════════════════════════
   작성 / 수정 페이지
══════════════════════════════════════════════ */
function initWrite(editId) {
  state.editId = editId || null;
  state.tags = [];
  // 참석자 초기화 (기본 3명 체크, 추가 명단 초기화)
  state.attendees = [...DEFAULT_ATT.map(n => ({ name: n, checked: true }))];

  document.getElementById('writePageTitle').textContent =
    editId ? '회의록 수정' : '새 회의록 작성';

  // 폼 필드 초기화
  const fields = ['f-title','f-date','f-purpose','f-agenda','f-discussion','f-decisions'];
  fields.forEach(id => { const el = document.getElementById(id); if (el) el.value = ''; });
  document.getElementById('f-date').value = today();

  // 태그 렌더
  renderTags();
  renderAttendees();

  // 수정 모드: 기존 데이터 채우기
  if (editId) {
    const m = state.meetings.find(x => x.id === editId);
    if (m) {
      document.getElementById('f-title').value      = m.title || '';
      document.getElementById('f-date').value       = m.date  || today();
      document.getElementById('f-purpose').value    = m.purpose    || '';
      document.getElementById('f-agenda').value     = m.agenda     || '';
      document.getElementById('f-discussion').value = m.discussion || '';
      document.getElementById('f-decisions').value  = m.decisions  || '';
      // 키워드 복원
      state.tags = m.keywords || [];
      // 참석자 복원
      const saved = m.attendees || [];
      state.attendees = DEFAULT_ATT.map(n => ({
        name: n,
        checked: saved.includes(n)
      }));
      // 추가 참석자
      saved.filter(n => !DEFAULT_ATT.includes(n))
           .forEach(n => state.attendees.push({ name: n, checked: true }));
      renderTags();
      renderAttendees();
    }
  }
}

/* ── 키워드 태그 ──────────────────────────────── */
function renderTags() {
  const wrap = document.getElementById('tagWrap');
  const inp  = document.getElementById('tagInput');
  // 기존 태그 삭제 (input 제외)
  [...wrap.children].forEach(c => { if (c !== inp) c.remove(); });
  // 앞에 삽입
  state.tags.forEach(t => {
    const span = document.createElement('span');
    span.className = 'tag-item';
    span.innerHTML = `${esc(t)}<button onclick="removeTag('${esc(t)}')" type="button">✕</button>`;
    wrap.insertBefore(span, inp);
  });
}

function handleTagKey(e) {
  if (e.key === 'Enter' || e.key === ',') {
    e.preventDefault();
    addTag(e.target.value.replace(',', '').trim());
  } else if (e.key === 'Backspace' && e.target.value === '' && state.tags.length) {
    removeTag(state.tags[state.tags.length - 1]);
  }
}

function addTag(val) {
  if (!val) return;
  if (!state.tags.includes(val)) {
    state.tags.push(val);
    renderTags();
  }
  document.getElementById('tagInput').value = '';
}

function removeTag(t) {
  state.tags = state.tags.filter(x => x !== t);
  renderTags();
}

/* ── 참석자 체크박스 ─────────────────────────── */
function renderAttendees() {
  const list = document.getElementById('attList');
  list.innerHTML = state.attendees.map((a, i) => `
    <label class="att-item ${a.checked ? 'checked' : ''}" onclick="toggleAtt(${i}, event)">
      <input type="checkbox" ${a.checked ? 'checked' : ''} onchange="toggleAtt(${i}, event)" />
      ${esc(a.name)}
    </label>
  `).join('');
}

function toggleAtt(idx, e) {
  e.stopPropagation();
  state.attendees[idx].checked = !state.attendees[idx].checked;
  renderAttendees();
}

function handleAttKey(e) {
  if (e.key === 'Enter') { e.preventDefault(); addAttFromInput(); }
}

function addAttFromInput() {
  const inp = document.getElementById('attAddInp');
  const names = inp.value.split(/[,，\s]+/).map(s => s.trim()).filter(Boolean);
  names.forEach(n => {
    if (!state.attendees.find(a => a.name === n)) {
      state.attendees.push({ name: n, checked: true });
    }
  });
  inp.value = '';
  renderAttendees();
}

/* ── 저장 ────────────────────────────────────── */
async function saveMeeting() {
  const title = document.getElementById('f-title').value.trim();
  if (!title) { toast('⚠️ 회의 제목을 입력해주세요.'); document.getElementById('f-title').focus(); return; }

  // 태그 입력창에 미처 Enter 안 친 값 처리
  const pendingTag = document.getElementById('tagInput').value.trim();
  if (pendingTag) addTag(pendingTag);

  const payload = {
    title,
    date:       document.getElementById('f-date').value,
    keywords:   state.tags,
    attendees:  state.attendees.filter(a => a.checked).map(a => a.name),
    purpose:    document.getElementById('f-purpose').value.trim(),
    agenda:     document.getElementById('f-agenda').value.trim(),
    discussion: document.getElementById('f-discussion').value.trim(),
    decisions:  document.getElementById('f-decisions').value.trim(),
  };

  try {
    if (state.editId) {
      await fetch(`${API}/meetings/${state.editId}`, {
        method: 'PUT', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      toast('✓ 수정되었습니다.');
    } else {
      await fetch(`${API}/meetings`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      toast('✓ 저장되었습니다.');
    }
    setTimeout(() => go('list'), 600);
  } catch (e) {
    toast('❌ 저장 실패 — 서버를 확인해주세요.');
  }
}

/* ══════════════════════════════════════════════
   상세 모달
══════════════════════════════════════════════ */
function openModal(id) {
  const m = state.meetings.find(x => x.id === id);
  if (!m) return;

  const kwHtml = (m.keywords?.length)
    ? m.keywords.map(k => `<span class="kw-chip">${esc(k)}</span>`).join('')
    : '<span style="color:var(--text-3)">—</span>';

  const attHtml = (m.attendees?.length)
    ? m.attendees.map(a => `<span class="modal-att-chip">${esc(a)}</span>`).join('')
    : '<span style="color:var(--text-3)">—</span>';

  function sec(label, val) {
    if (!val) return '';
    return `<div class="modal-sec">
              <div class="modal-sec-label">${label}</div>
              <div class="modal-sec-val">${esc(val)}</div>
            </div>`;
  }

  document.getElementById('modal').innerHTML = `
    <div class="modal-head">
      <div class="modal-head-top">
        <div class="modal-title">${esc(m.title)}</div>
        <button class="modal-close" onclick="closeModalDirect()">✕</button>
      </div>
      <div class="modal-meta">
        <span>📅 ${fmtDate(m.date)}</span>
      </div>
    </div>
    <div class="modal-body">
      <div class="modal-sec">
        <div class="modal-sec-label">🏷 주요 키워드</div>
        <div class="modal-kws">${kwHtml}</div>
      </div>
      <div class="modal-sec">
        <div class="modal-sec-label">👥 참석자</div>
        <div class="modal-atts">${attHtml}</div>
      </div>
      ${sec('🎯 회의 목적', m.purpose)}
      ${sec('📋 안건', m.agenda)}
      ${sec('💬 주요 논의 내용', m.discussion)}
      ${sec('✅ 결정사항', m.decisions)}
    </div>
    <div class="modal-foot">
      <button class="btn btn-g btn-sm" onclick="closeModalDirect()">닫기</button>
      <button class="btn btn-o btn-sm" onclick="editMeeting('${m.id}'); closeModalDirect()">수정</button>
      <button class="btn btn-d btn-sm" onclick="deleteMeeting('${m.id}'); closeModalDirect()">삭제</button>
    </div>
  `;
  document.getElementById('overlay').classList.add('on');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (e.target === document.getElementById('overlay')) closeModalDirect();
}
function closeModalDirect() {
  document.getElementById('overlay').classList.remove('on');
  document.body.style.overflow = '';
}

/* ── 수정 / 삭제 ─────────────────────────────── */
function editMeeting(id) {
  go('write', id);
}

async function deleteMeeting(id) {
  if (!confirm('이 회의록을 삭제하시겠습니까?')) return;
  try {
    await fetch(`${API}/meetings/${id}`, { method: 'DELETE' });
    toast('삭제되었습니다.');
    await loadList();
  } catch (e) {
    toast('❌ 삭제 실패');
  }
}

/* ══════════════════════════════════════════════
   유틸
══════════════════════════════════════════════ */
function today() {
  return new Date().toISOString().split('T')[0];
}
function fmtDate(d) {
  if (!d) return '—';
  const dt = new Date(d + 'T00:00:00');
  const days = ['일','월','화','수','목','금','토'];
  return `${dt.getFullYear()}. ${dt.getMonth()+1}. ${dt.getDate()} (${days[dt.getDay()]})`;
}
function esc(str = '') {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

let toastTid;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('on');
  clearTimeout(toastTid);
  toastTid = setTimeout(() => el.classList.remove('on'), 2600);
}

/* ── 초기화 ─────────────────────────────────── */
window.addEventListener('DOMContentLoaded', () => go('list'));
</script>
</body>
</html>
